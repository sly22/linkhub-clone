<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>링크 자동 확인 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #status-bar {
      font-size: 13px;
      color: #8b949e;
      background: #21262d;
      padding: 6px 12px;
      border-radius: 6px;
      min-width: 200px;
    }

    #recheck-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    #recheck-btn:hover { background: #2ea043; }
    #recheck-btn:disabled { background: #3d4450; cursor: not-allowed; }

    .container { padding: 24px; max-width: 1100px; margin: 0 auto; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .label { font-size: 12px; color: #8b949e; }
    .stat-total .num { color: #58a6ff; }
    .stat-success .num { color: #3fb950; }
    .stat-error .num { color: #f85149; }
    .stat-checking .num { color: #d29922; }

    .table-wrap {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #21262d;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #8b949e;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #30363d;
    }

    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1c2128; }

    td { padding: 12px 14px; vertical-align: middle; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-success { background: #1a3a20; color: #3fb950; }
    .badge-error   { background: #3a1a1a; color: #f85149; }
    .badge-checking {
      background: #2d2a1a;
      color: #d29922;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .badge-pending { background: #21262d; color: #8b949e; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .url-cell {
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url-link {
      color: #58a6ff;
      text-decoration: none;
    }
    .url-link:hover { text-decoration: underline; }

    .title-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c9d1d9;
    }

    .code-200, .code-2xx { color: #3fb950; font-weight: 600; }
    .code-3xx { color: #58a6ff; font-weight: 600; }
    .code-4xx, .code-5xx { color: #f85149; font-weight: 600; }
    .code-null { color: #8b949e; }

    .loadtime { color: #8b949e; }
    .loadtime.fast { color: #3fb950; }
    .loadtime.slow { color: #d29922; }
    .loadtime.very-slow { color: #f85149; }

    .error-msg {
      font-size: 11px;
      color: #f85149;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timestamp { color: #8b949e; font-size: 11px; white-space: nowrap; }

    .btn-recheck-row {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-recheck-row:hover { border-color: #58a6ff; color: #58a6ff; }

    #empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #8b949e;
    }
    #empty-state h3 { margin-bottom: 8px; color: #c9d1d9; }
    #empty-state code {
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: #e1e4e8;
    }

    .conn-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }
    .conn-indicator.disconnected { background: #f85149; }
  </style>
</head>
<body>

<header>
  <h1>
    <span class="conn-indicator" id="conn-dot"></span>
    링크 자동 확인 대시보드
  </h1>
  <div class="header-right">
    <div id="status-bar">대기 중...</div>
    <button id="recheck-btn" onclick="recheckAll()">전체 재확인</button>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card stat-total">
      <div class="num" id="stat-total">0</div>
      <div class="label">전체</div>
    </div>
    <div class="stat-card stat-success">
      <div class="num" id="stat-success">0</div>
      <div class="label">성공</div>
    </div>
    <div class="stat-card stat-error">
      <div class="num" id="stat-error">0</div>
      <div class="label">실패</div>
    </div>
    <div class="stat-card stat-checking">
      <div class="num" id="stat-checking">0</div>
      <div class="label">확인 중</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>상태</th>
          <th>URL</th>
          <th>페이지 제목</th>
          <th>HTTP</th>
          <th>응답 시간</th>
          <th>오류</th>
          <th>확인 시각</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="empty-state">
      <h3>링크가 없습니다</h3>
      <p><code>links.json</code> 파일에 URL을 추가하면 자동으로 확인합니다.</p>
    </div>
  </div>
</div>

<script>
  let allResults = {};
  let rowOrder = [];

  const tbody = document.getElementById('results-body');
  const emptyState = document.getElementById('empty-state');

  function updateStats() {
    const vals = Object.values(allResults);
    const total = vals.length;
    const success = vals.filter(r => r.status === 'success').length;
    const error = vals.filter(r => r.status === 'error').length;
    const checking = vals.filter(r => r.status === 'checking').length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-success').textContent = success;
    document.getElementById('stat-error').textContent = error;
    document.getElementById('stat-checking').textContent = checking;

    emptyState.style.display = total === 0 ? 'block' : 'none';
  }

  function statusBadge(status) {
    const map = {
      success:  { cls: 'badge-success',  text: '성공' },
      error:    { cls: 'badge-error',    text: '실패' },
      checking: { cls: 'badge-checking', text: '확인 중' },
      pending:  { cls: 'badge-pending',  text: '대기' },
    };
    const s = map[status] || map.pending;
    return `<span class="badge ${s.cls}"><span class="dot"></span>${s.text}</span>`;
  }

  function codeClass(code) {
    if (!code) return 'code-null';
    if (code >= 200 && code < 300) return 'code-2xx';
    if (code >= 300 && code < 400) return 'code-3xx';
    if (code >= 400 && code < 500) return 'code-4xx';
    return 'code-5xx';
  }

  function loadtimeClass(ms) {
    if (!ms) return 'loadtime';
    if (ms < 1000) return 'loadtime fast';
    if (ms < 3000) return 'loadtime slow';
    return 'loadtime very-slow';
  }

  function formatTime(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleTimeString('ko-KR');
  }

  function renderRow(r, idx) {
    const urlEnc = encodeURIComponent(r.url);
    return `
      <tr id="row-${CSS.escape(r.url)}">
        <td style="color:#8b949e">${idx + 1}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="url-cell"><a class="url-link" href="${escHtml(r.url)}" target="_blank" rel="noopener">${escHtml(r.url)}</a></td>
        <td class="title-cell">${r.title ? escHtml(r.title) : '<span style="color:#8b949e">-</span>'}</td>
        <td class="${codeClass(r.statusCode)}">${r.statusCode || '<span style="color:#8b949e">-</span>'}</td>
        <td class="${loadtimeClass(r.loadTime)}">${r.loadTime != null ? r.loadTime + 'ms' : '<span style="color:#8b949e">-</span>'}</td>
        <td><span class="error-msg" title="${r.error ? escHtml(r.error) : ''}">${r.error ? escHtml(r.error) : '<span style="color:#8b949e">-</span>'}</span></td>
        <td class="timestamp">${formatTime(r.timestamp)}</td>
        <td><button class="btn-recheck-row" onclick="recheckOne('${urlEnc}')">재확인</button></td>
      </tr>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderAll() {
    tbody.innerHTML = rowOrder
      .filter(u => allResults[u])
      .map((u, i) => renderRow(allResults[u], i))
      .join('');
    updateStats();
  }

  function applyUpdate(url, data) {
    allResults[url] = data;
    if (!rowOrder.includes(url)) rowOrder.push(url);

    const rowId = `row-${CSS.escape(url)}`;
    const existing = document.getElementById(rowId);
    const idx = rowOrder.indexOf(url);
    const html = renderRow(data, idx);

    if (existing) {
      existing.outerHTML = html;
    } else {
      renderAll();
      return;
    }
    updateStats();
  }

  // SSE 연결
  function connectSSE() {
    const es = new EventSource('/events');
    const dot = document.getElementById('conn-dot');

    es.onopen = () => {
      dot.classList.remove('disconnected');
    };

    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'init') {
        allResults = msg.results;
        rowOrder = Object.keys(msg.results);
        renderAll();
      } else if (msg.type === 'update') {
        applyUpdate(msg.url, msg.data);
      } else if (msg.type === 'status' || msg.type === 'done' || msg.type === 'error') {
        document.getElementById('status-bar').textContent = msg.message;
        if (msg.type === 'done') {
          document.getElementById('recheck-btn').disabled = false;
        }
      }
    };

    es.onerror = () => {
      dot.classList.add('disconnected');
      document.getElementById('status-bar').textContent = '서버 연결 끊김 — 재연결 중...';
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  async function recheckAll() {
    document.getElementById('recheck-btn').disabled = true;
    document.getElementById('status-bar').textContent = '재확인 요청 중...';
    await fetch('/api/recheck', { method: 'POST' });
  }

  async function recheckOne(urlEnc) {
    const url = decodeURIComponent(urlEnc);
    await fetch(`/api/recheck/${urlEnc}`, { method: 'POST' });
  }

  connectSSE();
</script>
</body>
</html>
